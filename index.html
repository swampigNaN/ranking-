<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase スコア管理システム</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f4f7f6; /* 全体的に明るい背景 */
            color: #333; /* 文字色を黒ベースに */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background-color: #ffffff; /* コンテナ背景を白に */
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 480px;
        }
        /* タブ切り替えボタンのスタイル */
        .tab-menu {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 10px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: #718096;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 8px;
        }
        .tab-btn:hover {
            background-color: #f7fafc;
            color: #2d3748;
        }
        .tab-btn.active {
            background-color: #3182ce;
            color: #ffffff;
        }
        /* コンテンツエリアの表示制御 */
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        /* 入力フォームのスタイル */
        h2 {
            font-size: 22px;
            margin-bottom: 20px;
            text-align: center;
            color: #2c3e50;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: #4a5568;
        }
        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            background-color: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            color: #333;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #3182ce;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #3182ce;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .submit-btn:hover {
            background-color: #2b6cb0;
        }
        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        .success {
            background-color: #c6f6d5;
            color: #22543d;
            display: block;
        }
        .error {
            background-color: #fed7d7;
            color: #742a2a;
            display: block;
        }
        /* ランキングのスタイル（明るいテーマ用） */
        .ranking-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .ranking-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            border-radius: 10px;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            font-size: 16px;
            font-weight: 600;
            color: #2d3748;
        }
        /* 順位ごとの装飾も白背景に合わせて調整 */
        .rank-1 { background-color: #fffbeb; border-color: #fcd34d; color: #92400e; }
        .rank-2 { background-color: #f1f5f9; border-color: #cbd5e1; color: #334155; }
        .rank-3 { background-color: #fff7ed; border-color: #fdba74; color: #9a3412; }
        
        .rank-number { font-size: 20px; font-weight: 800; width: 40px; text-align: left; }
        .name { flex-grow: 1; text-align: left; padding-left: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .score { font-size: 20px; font-weight: 800; }
        .no-data { color: #718096; font-style: italic; padding: 20px; text-align: center; }
        .loading { color: #3182ce; font-size: 16px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('input-tab')">スコア登録</button>
        <button class="tab-btn" onclick="switchTab('ranking-tab')">🏆 ランキング</button>
    </div>

    <div id="input-tab" class="tab-content active">
        <h2>スコアを登録する</h2>
        <div class="form-group">
            <label for="username">ユーザー名</label>
            <input type="text" id="username" placeholder="例: TanakaTaro">
        </div>
        <div class="form-group">
            <label for="score">点数</label>
            <input type="number" id="score" placeholder="例: 100" min="0">
        </div>
        <button id="submit-btn" class="submit-btn">スコアを送信</button>
        <div id="message-box" class="message"></div>
    </div>

    <div id="ranking-tab" class="tab-content">
        <h2>TOP 3 RANKING</h2>
        <div id="loading" class="loading">データを読み込み中...</div>
        <ol id="ranking" class="ranking-list" style="display: none;"></ol>
    </div>
</div>

<script>
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, query, orderByValue, limitToLast, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2lcY-0TXBKFN2VajwSuQha8TfBvJeQk8",
        authDomain: "ranking-73f77.firebaseapp.com",
        databaseURL: "https://ranking-73f77-default-rtdb.firebaseio.com",
        projectId: "ranking-73f77",
        storageBucket: "ranking-73f77.firebasestorage.app",
        messagingSenderId: "192093284893",
        appId: "1:192093284893:web:c18f7dbfdec693cce2f4f4",
        measurementId: "G-9W2L9K2SW3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // スコア送信
    const usernameInput = document.getElementById('username');
    const scoreInput = document.getElementById('score');
    const submitBtn = document.getElementById('submit-btn');
    const messageBox = document.getElementById('message-box');

    function showMessage(text, isSuccess) {
        messageBox.textContent = text;
        messageBox.className = 'message ' + (isSuccess ? 'success' : 'error');
    }

    submitBtn.addEventListener('click', () => {
        const username = usernameInput.value.trim();
        const score = scoreInput.value;

        if (!username || !score) {
            showMessage("ユーザー名と点数を両方入力してください。", false);
            return;
        }

        const invalidChars = /[.#$\\[\\]]/;
        if (invalidChars.test(username)) {
            showMessage("ユーザー名に「.」「$」「#」「[」「]」は使えません。", false);
            return;
        }

        set(ref(db, `scores/${username}`), Number(score))
            .then(() => {
                showMessage(`${username} さんのスコア (${score}点) を保存しました！`, true);
                usernameInput.value = '';
                scoreInput.value = '';
            })
            .catch((error) => {
                showMessage("保存に失敗しました: " + error.message, false);
            });
    });

    // ランキング取得
    const rankingList = document.getElementById('ranking');
    const loadingDiv = document.getElementById('loading');

    const scoresRef = ref(db, 'scores');
    const topScoresQuery = query(scoresRef, orderByValue(), limitToLast(3));

    onValue(topScoresQuery, (snapshot) => {
        loadingDiv.style.display = 'none';
        rankingList.innerHTML = '';

        if (!snapshot.exists()) {
            rankingList.innerHTML = '<div class="no-data">データがまだありません</div>';
            rankingList.style.display = 'block';
            return;
        }

        const items = [];
        snapshot.forEach((childSnapshot) => {
            items.push({
                name: childSnapshot.key,
                score: childSnapshot.val()
            });
        });

        items.reverse();

        items.forEach((item, index) => {
            const rank = index + 1;
            const li = document.createElement('li');
            li.className = `ranking-item rank-${rank}`;
            
            let medal = '';
            if (rank === 1) medal = '🥇 ';
            if (rank === 2) medal = '🥈 ';
            if (rank === 3) medal = '🥉 ';

            li.innerHTML = `
                <span class="rank-number">${rank}位</span>
                <span class="name">${medal}${item.name}</span>
                <span class="score">${item.score}点</span>
            `;
            rankingList.appendChild(li);
        });

        rankingList.style.display = 'flex';
    }, (error) => {
        console.error(error);
        loadingDiv.textContent = "データの読み込みに失敗しました。";
    });
</script>

</body>
</html>
