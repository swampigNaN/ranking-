<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>きのこ vs たけのこ リアルタイム・ランキング</title>
    <style>
        /* --- デザイン（大きく、美しく、チョコレート・テーマ） --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #fcfaf2;
            color: #4a2c2a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px;
        }
        .container {
            background-color: #ffffff;
            padding: 60px;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(74, 44, 42, 0.1);
            width: 100%;
            max-width: 960px;
            text-align: center;
        }

        /* タブ切り替え */
        .tab-menu { display: flex; gap: 20px; margin-bottom: 40px; border-bottom: 3px solid #eee; padding-bottom: 15px; }
        .tab-btn {
            flex: 1; padding: 25px; background: none; border: none; color: #aaa;
            font-size: 28px; font-weight: bold; cursor: pointer; transition: 0.3s; border-radius: 15px;
        }
        .tab-btn:hover { background-color: #f9f9f9; }
        .tab-btn.active { background-color: #5d4037; color: #fff; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        h2 { font-size: 48px; margin-bottom: 40px; color: #5d4037; }

        /* 入力エリア */
        .form-group { margin-bottom: 45px; text-align: left; }
        label.main-label { display: block; margin-bottom: 15px; font-weight: bold; font-size: 24px; color: #5d4037; }
        input[type="text"], input[type="number"] {
            width: 100%; padding: 25px; border: 3px solid #eee; border-radius: 15px;
            font-size: 26px; transition: 0.3s;
        }
        input:focus { border-color: #5d4037; outline: none; }

        /* --- 陣営選択 (画像ボタン) --- */
        .faction-select-container { display: flex; gap: 30px; justify-content: center; margin-top: 10px; }
        .faction-card {
            flex: 1; cursor: pointer; position: relative;
            border: 6px solid #f0f0f0; border-radius: 25px; padding: 30px;
            transition: 0.4s; background: #fafafa; text-align: center;
        }
        .faction-card img {
            width: 180px; height: 180px; object-fit: contain; margin-bottom: 15px;
            filter: grayscale(100%); opacity: 0.5; transition: 0.4s;
        }
        .faction-card p { font-size: 24px; font-weight: bold; color: #999; }
        
        /* ラジオボタンは隠す */
        .faction-card input[type="radio"] { display: none; }

        /* 選択された時の動き */
        .faction-card:has(input:checked) { transform: translateY(-12px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); background: #fff; }
        .faction-card:has(input:checked) img { filter: grayscale(0%); opacity: 1; }
        .faction-card:has(input:checked) p { color: inherit; }

        .faction-card-kinoko:has(input:checked) { border-color: #e53e3e; color: #e53e3e; }
        .faction-card-takenoko:has(input:checked) { border-color: #38a169; color: #38a169; }

        .submit-btn {
            width: 100%; padding: 30px; background-color: #5d4037; color: #fff;
            border: none; border-radius: 15px; font-size: 32px; font-weight: bold;
            cursor: pointer; transition: 0.3s; margin-top: 40px;
        }
        .submit-btn:hover { background-color: #4a2c2a; transform: scale(1.02); }

        .message { margin-top: 30px; padding: 25px; border-radius: 15px; font-size: 20px; display: none; font-weight: bold; }
        .success { background-color: #d4edda; color: #155724; display: block; border: 2px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; display: block; border: 2px solid #f5c6cb; }

        /* --- ランキング画面 --- */
        .ranking-list { list-style: none; display: flex; flex-direction: column; gap: 20px; }
        .ranking-item {
            display: flex; align-items: center; padding: 25px 45px; border-radius: 20px;
            background: #fff; border: 2px solid #eee; font-size: 32px; font-weight: bold;
            transition: 0.3s;
        }
        .rank-num { width: 80px; font-size: 42px; font-weight: 900; color: #ccc; text-align: left; }
        .rank-1 { background-color: #fffbeb; border-color: #fcd34d; }
        .rank-1 .rank-num { color: #f1c40f; }
        .rank-2 { background-color: #f1f5f9; border-color: #cbd5e1; }
        .rank-2 .rank-num { color: #95a5a6; }
        .rank-3 { background-color: #fff7ed; border-color: #fdba74; }
        .rank-3 .rank-num { color: #d35400; }
        
        .rank-img { width: 90px; height: 90px; object-fit: contain; margin: 0 35px; border-radius: 50%; background: #fff; border: 2px solid #eee; }
        .rank-name { flex-grow: 1; text-align: left; color: #5d4037; }
        .rank-score { font-size: 36px; color: #5d4037; font-weight: 900; }

        .loading { font-size: 24px; color: #aaa; margin: 60px 0; font-weight: bold; }
        .no-data { font-size: 22px; color: #999; padding: 50px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <div class="tab-menu">
        <button class="tab-btn active" data-tab="input-tab">スコア入力</button>
        <button class="tab-btn" data-tab="ranking-tab">ランキング</button>
    </div>

    <div id="input-tab" class="tab-content active">
        <h2>あなたのスコアを登録</h2>
        <div class="form-group">
            <label class="main-label">ユーザー名</label>
            <input type="text" id="username" placeholder="例: たなか太郎">
        </div>
        <div class="form-group">
            <label class="main-label">点数</label>
            <input type="number" id="score" placeholder="0" min="0">
        </div>
        <div class="form-group">
            <label class="main-label">陣営を選択（画像をクリック！）</label>
            <div class="faction-select-container">
                <label class="faction-card faction-card-kinoko">
                    <input type="radio" name="faction" value="kinoko">
                    <img src="./kinoko.png" alt="きのこの山">
                    <p>きのこの山</p>
                </label>
                <label class="faction-card faction-card-takenoko">
                    <input type="radio" name="faction" value="takenoko">
                    <img src="./takenoko.png" alt="たけのこの里">
                    <p>たけのこの里</p>
                </label>
            </div>
        </div>
        <button id="submit-btn" class="submit-btn">スコアを送信！</button>
        <div id="message-box" class="message"></div>
    </div>

    <div id="ranking-tab" class="tab-content">
        <h2>TOP 5</h2>
        <div id="loading" class="loading">最新の戦況を読み込み中...</div>
        <ol id="ranking" class="ranking-list" style="display: none;"></ol>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, query, orderByChild, limitToLast, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // Firebaseの設定
    const firebaseConfig = {
        apiKey: "AIzaSyA2lcY-0TXBKFN2VajwSuQha8TfBvJeQk8",
        authDomain: "ranking-73f77.firebaseapp.com",
        databaseURL: "https://ranking-73f77-default-rtdb.firebaseio.com",
        projectId: "ranking-73f77",
        storageBucket: "ranking-73f77.firebasestorage.app",
        messagingSenderId: "192093284893",
        appId: "1:192093284893:web:c18f7dbfdec693cce2f4f4",
        measurementId: "G-9W2L9K2SW3"
    };

    // ローカル画像
    const factionImages = {
        kinoko: "./kinoko.png",
        takenoko: "./takenoko.png"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- タブ切り替え処理 ---
    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabContents = document.querySelectorAll('.tab-content');
    tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            tabBtns.forEach(b => b.classList.remove('active'));
            tabContents.forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(btn.getAttribute('data-tab')).classList.add('active');
        });
    });

    // --- スコア送信処理 ---
    const usernameInput = document.getElementById('username');
    const scoreInput = document.getElementById('score');
    const submitBtn = document.getElementById('submit-btn');
    const messageBox = document.getElementById('message-box');

    submitBtn.addEventListener('click', () => {
        const username = usernameInput.value.trim();
        const score = scoreInput.value;
        const selectedFaction = document.querySelector('input[name="faction"]:checked');

        // 名前か点数が空欄ならエラー
        if (!username || !score) {
            messageBox.textContent = "名前と点数を入力してください。";
            messageBox.className = "message error";
            return;
        }

        // 陣営が未選択ならエラー
        if (!selectedFaction) {
            messageBox.textContent = "陣営を選択してください。";
            messageBox.className = "message error";
            return;
        }

        const faction = selectedFaction.value;

        set(ref(db, `scores/${username}`), {
            score: Number(score),
            faction: faction
        }).then(() => {
            messageBox.textContent = `成功！${username}さんのスコアを保存しました。`;
            messageBox.className = "message success";
            usernameInput.value = '';
            scoreInput.value = '';
            // ラジオボタンの選択を解除する
            selectedFaction.checked = false;
        }).catch(err => {
            messageBox.textContent = "通信エラー: " + err.message;
            messageBox.className = "message error";
        });
    });

    // --- ランキング取得処理 ---
    const rankingList = document.getElementById('ranking');
    const loadingDiv = document.getElementById('loading');
    const scoresRef = ref(db, 'scores');
    const topScoresQuery = query(scoresRef, orderByChild('score'), limitToLast(5));

    onValue(topScoresQuery, (snapshot) => {
        loadingDiv.style.display = 'none';
        rankingList.innerHTML = '';

        if (!snapshot.exists()) {
            rankingList.innerHTML = '<li class="no-data">まだ参戦データがありません。一番乗りを目指そう！</li>';
            rankingList.style.display = 'block';
            return;
        }

        const items = [];
        snapshot.forEach(child => {
            const val = child.val();
            items.push({ name: child.key, score: val.score, faction: val.faction });
        });
        items.reverse(); 

        items.forEach((item, i) => {
            const li = document.createElement('li');
            li.className = `ranking-item rank-${i+1}`;
            const imgSrc = factionImages[item.faction] || factionImages.kinoko;
            
            li.innerHTML = `
                <span class="rank-num">${i+1}</span>
                <img src="${imgSrc}" class="rank-img" alt="icon">
                <span class="rank-name">${item.name}</span>
                <span class="rank-score">${item.score} 点</span>
            `;
            rankingList.appendChild(li);
        });
        rankingList.style.display = 'flex';
    }, (error) => {
        console.error(error);
        loadingDiv.textContent = "読み込みエラーが発生しました。ルール設定を確認してください。";
    });
</script>
</body>
</html>
