<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トップ3 ランキング</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background-color: #1e293b;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 30px;
            color: #38bdf8;
            font-weight: 800;
            letter-spacing: 1px;
        }
        .ranking-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .ranking-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-radius: 12px;
            background-color: #334155;
            font-size: 18px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .ranking-item:hover {
            transform: scale(1.02);
        }
        .rank-1 {
            background: linear-gradient(135deg, #eab308 0%, #ca8a04 100%);
            color: #0f172a;
        }
        .rank-2 {
            background: linear-gradient(135deg, #94a3b8 0%, #475569 100%);
            color: #fff;
        }
        .rank-3 {
            background: linear-gradient(135deg, #b45309 0%, #78350f 100%);
            color: #fff;
        }
        .rank-number {
            font-size: 24px;
            font-weight: 800;
            width: 40px;
            text-align: left;
        }
        .name {
            flex-grow: 1;
            text-align: left;
            padding-left: 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .score {
            font-size: 22px;
            font-weight: 800;
        }
        .no-data {
            color: #94a3b8;
            font-style: italic;
            padding: 20px;
        }
        .loading {
            color: #38bdf8;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 TOP 3 RANKING</h1>

    <div id="loading" class="loading">データを読み込み中...</div>
    
    <ol id="ranking" class="ranking-list" style="display: none;"></ol>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, query, orderByValue, limitToLast, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // 設定情報を適用しました
    const firebaseConfig = {
        apiKey: "AIzaSyA2lcY-0TXBKFN2VajwSuQha8TfBvJeQk8",
        authDomain: "ranking-73f77.firebaseapp.com",
        databaseURL: "https://ranking-73f77-default-rtdb.firebaseio.com",
        projectId: "ranking-73f77",
        storageBucket: "ranking-73f77.firebasestorage.app",
        messagingSenderId: "192093284893",
        appId: "1:192093284893:web:c18f7dbfdec693cce2f4f4",
        measurementId: "G-9W2L9K2SW3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const rankingList = document.getElementById('ranking');
    const loadingDiv = document.getElementById('loading');

    // スコア順にソートして、上位3件を取得するクエリ
    const scoresRef = ref(db, 'scores');
    const topScoresQuery = query(scoresRef, orderByValue(), limitToLast(3));

    onValue(topScoresQuery, (snapshot) => {
        loadingDiv.style.display = 'none';
        rankingList.innerHTML = '';

        if (!snapshot.exists()) {
            rankingList.innerHTML = '<div class="no-data">データがまだありません</div>';
            rankingList.style.display = 'block';
            return;
        }

        const items = [];
        snapshot.forEach((childSnapshot) => {
            items.push({
                name: childSnapshot.key,
                score: childSnapshot.val()
            });
        });

        // 降順（高い順）に並び替え
        items.reverse();

        items.forEach((item, index) => {
            const rank = index + 1;
            const li = document.createElement('li');
            li.className = `ranking-item rank-${rank}`;
            
            let medal = '';
            if (rank === 1) medal = '🥇 ';
            if (rank === 2) medal = '🥈 ';
            if (rank === 3) medal = '🥉 ';

            li.innerHTML = `
                <span class="rank-number">${rank}位</span>
                <span class="name">${medal}${item.name}</span>
                <span class="score">${item.score}点</span>
            `;
            rankingList.appendChild(li);
        });

        rankingList.style.display = 'flex';
    }, (error) => {
        console.error("Firebase Error:", error);
        loadingDiv.textContent = "データの読み込みに失敗しました。ルール設定等を確認してください。";
    });
</script>

</body>
</html>
