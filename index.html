<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ランキング</title>
    <style>
        /* グローバル設定 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f4f7f6; /* 全体的に明るい背景 */
            color: #333; /* 文字色を黒ベースに */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px; /* 余白を増やして見やすく */
        }
        .container {
            background-color: #ffffff; /* コンテナ背景を白に */
            padding: 60px; /* 大幅に増やしたパディングで要素間の見通しを良く */
            border-radius: 20px; /* 角丸を少し大きく */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); /* 影を柔らかく強調 */
            width: 100%;
            max-width: 900px; /* 幅を大幅に広げた（大きく） */
        }

        /* タブ切り替えボタンのスタイル */
        .tab-menu {
            display: flex;
            gap: 20px; /* 余白を増やした */
            margin-bottom: 40px; /* マージンを増やしてフォームと離す */
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 15px; /* パディングを増やした */
        }
        .tab-btn {
            flex: 1;
            padding: 18px 25px; /* 大きくして押しやすく */
            background: none;
            border: none;
            color: #718096;
            font-size: 20px; /* 大幅に上げたフォントサイズで文字を見やすく */
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 10px; /* 角丸を大きく */
        }
        .tab-btn:hover {
            background-color: #f7fafc;
            color: #2d3748;
        }
        .tab-btn.active {
            background-color: #3182ce;
            color: #ffffff;
            font-weight: 700; /* より強調 */
        }

        /* コンテンツエリアの表示制御 */
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        /* 入力フォームのスタイル */
        h2 {
            font-size: 36px; /* 大幅に上げたフォントサイズでタイトルを見やすく */
            margin-bottom: 30px; /* マージンを増やして見やすく */
            text-align: center;
            color: #2c3e50;
        }
        .form-group {
            margin-bottom: 30px; /* マージンを増やして各項目を離す */
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 10px; /* マージンを増やして入力欄と離す */
            font-weight: 600;
            font-size: 18px; /* フォントサイズを上げて読みやすく */
            color: #4a5568;
        }
        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 18px 20px; /* 大きくして入力しやすく、見やすく */
            background-color: #ffffff;
            border: 3px solid #e2e8f0; /* ボーダーを太くして視認性を向上 */
            border-radius: 12px; /* 角丸を大きく */
            font-size: 20px; /* 大幅に上げたフォントサイズで入力文字を見やすく */
            color: #333;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #3182ce;
        }
        .submit-btn {
            width: 100%;
            padding: 20px; /* 大きくして押しやすく */
            background-color: #3182ce;
            color: #ffffff;
            border: none;
            border-radius: 12px; /* 角丸を大きく */
            font-size: 24px; /* 大幅に上げたフォントサイズでボタンを強調 */
            font-weight: 700; /* より強調 */
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 20px; /* マージンを追加してフォームと離す */
        }
        .submit-btn:hover {
            background-color: #2b6cb0;
        }
        .message {
            margin-top: 20px; /* マージンを増やした */
            padding: 15px; /* パディングを増やした */
            border-radius: 10px; /* 角丸を大きく */
            text-align: center;
            font-size: 16px; /* フォントサイズを上げた */
            display: none;
        }
        .success {
            background-color: #c6f6d5;
            color: #22543d;
            display: block;
        }
        .error {
            background-color: #fed7d7;
            color: #742a2a;
            display: block;
        }

        /* ランキングのスタイル（明るいテーマ用、拡張） */
        .ranking-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 20px; /* 余白を増やして各順位を離す */
        }
        .ranking-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 40px; /* 大幅に大きくした（見やすく、大きく） */
            border-radius: 15px; /* 角丸を大きく */
            background-color: #f8fafc;
            border: 2px solid #e2e8f0; /* ボーダーを太くして視認性を向上 */
            font-size: 24px; /* 大幅に上げたフォントサイズで見やすく、大きく */
            font-weight: 600;
            color: #2d3748;
            transition: transform 0.2s; /* ホバー効果を追加 */
        }
        .ranking-item:hover {
            transform: translateY(-5px); /* 少し浮かせて強調 */
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        /* 順位ごとの装飾（見やすく、魅力的、白背景） */
        .rank-1 {
            background-color: #fffbeb;
            border-color: #fcd34d;
            color: #92400e;
            box-shadow: inset 0 0 10px rgba(252, 211, 77, 0.3); /* 内側の影で立体感 */
        }
        .rank-2 {
            background-color: #f1f5f9;
            border-color: #cbd5e1;
            color: #334155;
            box-shadow: inset 0 0 10px rgba(203, 213, 225, 0.3);
        }
        .rank-3 {
            background-color: #fff7ed;
            border-color: #fdba74;
            color: #9a3412;
            box-shadow: inset 0 0 10px rgba(253, 186, 116, 0.3);
        }

        .rank-number {
            font-size: 32px; /* 大幅に大きくした（見やすく） */
            font-weight: 800;
            width: 60px; /* 幅を広げた */
            text-align: left;
        }
        .name {
            flex-grow: 1;
            text-align: left;
            padding-left: 10px; /* 余白を増やした */
            font-size: 28px; /* 大幅に大きくした（見やすく、強調） */
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .score {
            font-size: 32px; /* 大幅に大きくした（見やすく、強調） */
            font-weight: 800;
            color: inherit; /* 親要素の色を継承 */
        }
        .no-data {
            color: #718096;
            font-style: italic;
            padding: 30px; /* パディングを増やした */
            text-align: center;
            font-size: 18px; /* フォントサイズを上げた */
        }
        .loading {
            color: #3182ce;
            font-size: 18px; /* フォントサイズを上げた */
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('input-tab')">スコア登録</button>
        <button class="tab-btn" onclick="switchTab('ranking-tab')">🏆 ランキング</button>
    </div>

    <div id="input-tab" class="tab-content active">
        <h2>スコアを登録する</h2>
        <div class="form-group">
            <label for="username">ユーザー名</label>
            <input type="text" id="username" placeholder="例: TanakaTaro">
        </div>
        <div class="form-group">
            <label for="score">点数</label>
            <input type="number" id="score" placeholder="例: 100" min="0">
        </div>
        <button id="submit-btn" class="submit-btn">スコアを送信</button>
        <div id="message-box" class="message"></div>
    </div>

    <div id="ranking-tab" class="tab-content">
        <h2>TOP 3 RANKING</h2>
        <div id="loading" class="loading">データを読み込み中...</div>
        <ol id="ranking" class="ranking-list" style="display: none;"></ol>
    </div>
</div>

<script>
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, query, orderByValue, limitToLast, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA2lcY-0TXBKFN2VajwSuQha8TfBvJeQk8",
        authDomain: "ranking-73f77.firebaseapp.com",
        databaseURL: "https://ranking-73f77-default-rtdb.firebaseio.com",
        projectId: "ranking-73f77",
        storageBucket: "ranking-73f77.firebasestorage.app",
        messagingSenderId: "192093284893",
        appId: "1:192093284893:web:c18f7dbfdec693cce2f4f4",
        measurementId: "G-9W2L9K2SW3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // スコア送信
    const usernameInput = document.getElementById('username');
    const scoreInput = document.getElementById('score');
    const submitBtn = document.getElementById('submit-btn');
    const messageBox = document.getElementById('message-box');

    function showMessage(text, isSuccess) {
        messageBox.textContent = text;
        messageBox.className = 'message ' + (isSuccess ? 'success' : 'error');
    }

    submitBtn.addEventListener('click', () => {
        const username = usernameInput.value.trim();
        const score = scoreInput.value;

        if (!username || !score) {
            showMessage("ユーザー名と点数を両方入力してください。", false);
            return;
        }

        const invalidChars = /[.#$\\[\\]]/;
        if (invalidChars.test(username)) {
            showMessage("ユーザー名に「.」「$」「#」「[」「]」は使えません。", false);
            return;
        }

        set(ref(db, `scores/${username}`), Number(score))
            .then(() => {
                showMessage(`${username} さんのスコア (${score}点) を保存しました！`, true);
                usernameInput.value = '';
                scoreInput.value = '';
            })
            .catch((error) => {
                showMessage("保存に失敗しました: " + error.message, false);
            });
    });

    // ランキング取得
    const rankingList = document.getElementById('ranking');
    const loadingDiv = document.getElementById('loading');

    const scoresRef = ref(db, 'scores');
    const topScoresQuery = query(scoresRef, orderByValue(), limitToLast(3));

    onValue(topScoresQuery, (snapshot) => {
        loadingDiv.style.display = 'none';
        rankingList.innerHTML = '';

        if (!snapshot.exists()) {
            rankingList.innerHTML = '<div class="no-data">データがまだありません</div>';
            rankingList.style.display = 'block';
            return;
        }

        const items = [];
        snapshot.forEach((childSnapshot) => {
            items.push({
                name: childSnapshot.key,
                score: childSnapshot.val()
            });
        });

        items.reverse();

        items.forEach((item, index) => {
            const rank = index + 1;
            const li = document.createElement('li');
            li.className = `ranking-item rank-${rank}`;
            
            let medal = '';
            if (rank === 1) medal = '🥇 ';
            if (rank === 2) medal = '🥈 ';
            if (rank === 3) medal = '🥉 ';

            li.innerHTML = `
                <span class="rank-number">${rank}位</span>
                <span class="name">${medal}${item.name}</span>
                <span class="score">${item.score}点</span>
            `;
            rankingList.appendChild(li);
        });

        rankingList.style.display = 'flex';
    }, (error) => {
        console.error(error);
        loadingDiv.textContent = "データの読み込みに失敗しました。";
    });
</script>

</body>
</html>
