<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase スコア管理システム（陣営選択つき・TOP 5）</title>
    <style>
        /* --- CSS（デザイン） --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px;
        }
        .container {
            background-color: #ffffff;
            padding: 60px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 900px;
        }

        /* タブ切り替えボタンのスタイル */
        .tab-menu {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 15px;
        }
        .tab-btn {
            flex: 1;
            padding: 18px 25px;
            background: none;
            border: none;
            color: #718096;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 10px;
        }
        .tab-btn:hover {
            background-color: #f7fafc;
            color: #2d3748;
        }
        .tab-btn.active {
            background-color: #3182ce;
            color: #ffffff;
            font-weight: 700;
        }

        /* コンテンツエリアの表示制御 */
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        /* 入力フォームのスタイル */
        h2 {
            font-size: 36px;
            margin-bottom: 30px;
            text-align: center;
            color: #2c3e50;
        }
        .form-group {
            margin-bottom: 30px;
            text-align: left;
        }
        label.input-label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 18px;
            color: #4a5568;
        }
        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 18px 20px;
            background-color: #ffffff;
            border: 3px solid #e2e8f0;
            border-radius: 12px;
            font-size: 20px;
            color: #333;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #3182ce;
        }

        /* 陣営選択のラジオボタン用スタイル */
        .faction-options {
            display: flex;
            gap: 15px;
        }
        .faction-label {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 15px;
            background-color: #f8fafc;
            border: 3px solid #e2e8f0;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .faction-label:has(input:checked) {
            border-color: #3182ce;
            background-color: #ebf8ff;
            color: #3182ce;
        }
        .faction-label input[type="radio"] {
            transform: scale(1.5);
            cursor: pointer;
        }

        .submit-btn {
            width: 100%;
            padding: 20px;
            background-color: #3182ce;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 24px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 20px;
        }
        .submit-btn:hover {
            background-color: #2b6cb0;
        }
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-size: 16px;
            display: none;
        }
        .success {
            background-color: #c6f6d5;
            color: #22543d;
            display: block;
        }
        .error {
            background-color: #fed7d7;
            color: #742a2a;
            display: block;
        }

        /* ランキングのスタイル */
        .ranking-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .ranking-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            border-radius: 15px;
            background-color: #ffffff;
            border: 2px solid #e2e8f0;
            font-size: 24px;
            font-weight: 600;
            color: #4a5568;
            transition: transform 0.2s;
        }
        .ranking-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .rank-1 { background-color: #fffbeb; border-color: #fcd34d; color: #92400e; box-shadow: inset 0 0 10px rgba(252, 211, 77, 0.3); }
        .rank-2 { background-color: #f1f5f9; border-color: #cbd5e1; color: #334155; box-shadow: inset 0 0 10px rgba(203, 213, 225, 0.3); }
        .rank-3 { background-color: #fff7ed; border-color: #fdba74; color: #9a3412; box-shadow: inset 0 0 10px rgba(253, 186, 116, 0.3); }

        .rank-number {
            font-size: 32px;
            font-weight: 800;
            width: 60px;
            text-align: left;
        }
        
        /* 陣営画像のスタイル */
        .faction-img {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            border: 2px solid #fff;
        }

        .name {
            flex-grow: 1;
            text-align: left;
            font-size: 28px;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .score {
            font-size: 32px;
            font-weight: 800;
            color: inherit;
        }
        .no-data {
            color: #718096;
            font-style: italic;
            padding: 30px;
            text-align: center;
            font-size: 18px;
        }
        .loading {
            color: #3182ce;
            font-size: 18px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="tab-menu">
        <button class="tab-btn active" data-tab="input-tab">スコア登録</button>
        <button class="tab-btn" data-tab="ranking-tab">🏆 ランキング</button>
    </div>

    <div id="input-tab" class="tab-content active">
        <h2>スコアを登録する</h2>
        
        <div class="form-group">
            <label class="input-label" for="username">ユーザー名</label>
            <input type="text" id="username" placeholder="例: TanakaTaro">
        </div>

        <div class="form-group">
            <label class="input-label" for="score">点数</label>
            <input type="number" id="score" placeholder="例: 100" min="0">
        </div>

        <div class="form-group">
            <label class="input-label">所属陣営</label>
            <div class="faction-options">
                <label class="faction-label">
                    <input type="radio" name="faction" value="red" checked> 赤陣営
                </label>
                <label class="faction-label">
                    <input type="radio" name="faction" value="blue"> 青陣営
                </label>
                <label class="faction-label">
                    <input type="radio" name="faction" value="green"> 緑陣営
                </label>
            </div>
        </div>

        <button id="submit-btn" class="submit-btn">スコアを送信</button>
        <div id="message-box" class="message"></div>
    </div>

    <div id="ranking-tab" class="tab-content">
        <h2>TOP 5 RANKING</h2>
        <div id="loading" class="loading">データを読み込み中...</div>
        <ol id="ranking" class="ranking-list" style="display: none;"></ol>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, query, orderByChild, limitToLast, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // 1. Firebaseの設定情報
    const firebaseConfig = {
        apiKey: "AIzaSyA2lcY-0TXBKFN2VajwSuQha8TfBvJeQk8",
        authDomain: "ranking-73f77.firebaseapp.com",
        databaseURL: "https://ranking-73f77-default-rtdb.firebaseio.com",
        projectId: "ranking-73f77",
        storageBucket: "ranking-73f77.firebasestorage.app",
        messagingSenderId: "192093284893",
        appId: "1:192093284893:web:c18f7dbfdec693cce2f4f4",
        measurementId: "G-9W2L9K2SW3"
    };

    // 2. 陣営ごとの画像設定（好きな画像のURLに変えてください）
    const factionImages = {
        red: "https://placehold.co/100x100/ff4444/ffffff?text=Red",
        blue: "https://placehold.co/100x100/4444ff/ffffff?text=Blue",
        green: "https://placehold.co/100x100/44ff44/ffffff?text=Green"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- タブ切り替えの処理 ---
    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabContents = document.querySelectorAll('.tab-content');

    tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            tabBtns.forEach(b => b.classList.remove('active'));
            tabContents.forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            const targetTabId = btn.getAttribute('data-tab');
            document.getElementById(targetTabId).classList.add('active');
        });
    });

    // --- スコア送信処理 ---
    const usernameInput = document.getElementById('username');
    const scoreInput = document.getElementById('score');
    const submitBtn = document.getElementById('submit-btn');
    const messageBox = document.getElementById('message-box');

    function showMessage(text, isSuccess) {
        messageBox.textContent = text;
        messageBox.className = 'message ' + (isSuccess ? 'success' : 'error');
    }

    submitBtn.addEventListener('click', () => {
        const username = usernameInput.value.trim();
        const score = scoreInput.value;
        const faction = document.querySelector('input[name="faction"]:checked').value;

        if (!username || !score) {
            showMessage("ユーザー名と点数を両方入力してください。", false);
            return;
        }

        const invalidChars = /[.#$\\[\\]]/;
        if (invalidChars.test(username)) {
            showMessage("ユーザー名に「.」「$」「#」「[」「]」は使えません。", false);
            return;
        }

        const dataToSave = {
            score: Number(score),
            faction: faction
        };

        set(ref(db, `scores/${username}`), dataToSave)
            .then(() => {
                showMessage(`${username} さんのスコア (${score}点) を保存しました！`, true);
                usernameInput.value = '';
                scoreInput.value = '';
            })
            .catch((error) => {
                showMessage("保存に失敗しました: " + error.message, false);
            });
    });

    // --- ランキング取得処理 ---
    const rankingList = document.getElementById('ranking');
    const loadingDiv = document.getElementById('loading');
    const scoresRef = ref(db, 'scores');
    const topScoresQuery = query(scoresRef, orderByChild('score'), limitToLast(5));

    onValue(topScoresQuery, (snapshot) => {
        loadingDiv.style.display = 'none';
        rankingList.innerHTML = '';

        if (!snapshot.exists()) {
            rankingList.innerHTML = '<div class="no-data">データがまだありません</div>';
            rankingList.style.display = 'block';
            return;
        }

        const items = [];
        snapshot.forEach((childSnapshot) => {
            const data = childSnapshot.val();
            const userScore = typeof data === 'number' ? data : data.score;
            const userFaction = data.faction || 'red';

            items.push({
                name: childSnapshot.key,
                score: userScore,
                faction: userFaction
            });
        });

        items.reverse();

        items.forEach((item, index) => {
            const rank = index + 1;
            const li = document.createElement('li');
            li.className = `ranking-item rank-${rank}`;
            
            let medal = '';
            if (rank === 1) medal = '🥇 ';
            if (rank === 2) medal = '🥈 ';
            if (rank === 3) medal = '🥉 ';

            const imgSrc = factionImages[item.faction] || factionImages['red'];

            li.innerHTML = `
                <span class="rank-number">${rank}位</span>
                <img src="${imgSrc}" class="faction-img" alt="${item.faction} icon">
                <span class="name">${medal}${item.name}</span>
                <span class="score">${item.score}点</span>
            `;
            rankingList.appendChild(li);
        });

        rankingList.style.display = 'flex';
    }, (error) => {
        console.error(error);
        loadingDiv.textContent = "データの読み込みに失敗しました。";
    });
</script>

</body>
</html>
