<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>きのこ vs たけのこ リアルタイム・ランキング</title>
    <style>
        /* --- デザイン設定 (大きく、見やすく) --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #fcfaf2; /* 和菓子のような温かい白 */
            color: #4a2c2a; /* チョコのような茶色 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px;
        }
        .container {
            background-color: #ffffff;
            padding: 60px;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(74, 44, 42, 0.1);
            width: 100%;
            max-width: 960px;
            text-align: center;
        }

        /* タブ切り替え */
        .tab-menu { display: flex; gap: 20px; margin-bottom: 40px; border-bottom: 3px solid #eee; padding-bottom: 15px; }
        .tab-btn {
            flex: 1; padding: 20px; background: none; border: none; color: #aaa;
            font-size: 24px; font-weight: bold; cursor: pointer; transition: 0.3s; border-radius: 15px;
        }
        .tab-btn.active { background-color: #5d4037; color: #fff; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        h2 { font-size: 42px; margin-bottom: 30px; color: #5d4037; }

        /* 入力欄 */
        .form-group { margin-bottom: 40px; text-align: left; }
        label.main-label { display: block; margin-bottom: 15px; font-weight: bold; font-size: 22px; color: #5d4037; }
        input[type="text"], input[type="number"] {
            width: 100%; padding: 20px; border: 3px solid #eee; border-radius: 15px;
            font-size: 24px; transition: 0.3s;
        }
        input:focus { border-color: #5d4037; outline: none; }

        /* --- 陣営選択 (画像ボタン) --- */
        .faction-select-container { display: flex; gap: 30px; justify-content: center; }
        .faction-card {
            flex: 1; cursor: pointer; position: relative;
            border: 5px solid transparent; border-radius: 20px; padding: 20px;
            transition: 0.3s; background: #f9f9f9; text-align: center;
        }
        .faction-card img {
            width: 150px; height: 150px; object-fit: contain; margin-bottom: 15px;
            filter: grayscale(100%); opacity: 0.6; transition: 0.3s;
        }
        .faction-card p { font-size: 22px; font-weight: bold; }
        
        /* ラジオボタンは隠す */
        .faction-card input[type="radio"] { display: none; }

        /* 選択時のスタイル */
        .faction-card:has(input:checked) { border-color: #5d4037; background-color: #fff; transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .faction-card:has(input:checked) img { filter: grayscale(0%); opacity: 1; }
        .faction-card-kinoko:has(input:checked) { border-color: #e53e3e; color: #e53e3e; }
        .faction-card-takenoko:has(input:checked) { border-color: #38a169; color: #38a169; }

        .submit-btn {
            width: 100%; padding: 25px; background-color: #5d4037; color: #fff;
            border: none; border-radius: 15px; font-size: 28px; font-weight: bold;
            cursor: pointer; transition: 0.3s; margin-top: 30px;
        }
        .submit-btn:hover { background-color: #4a2c2a; transform: scale(1.02); }

        .message { margin-top: 25px; padding: 20px; border-radius: 15px; font-size: 18px; display: none; }
        .success { background-color: #d4edda; color: #155724; display: block; }
        .error { background-color: #f8d7da; color: #721c24; display: block; }

        /* --- ランキング --- */
        .ranking-list { list-style: none; display: flex; flex-direction: column; gap: 20px; }
        .ranking-item {
            display: flex; align-items: center; padding: 25px 40px; border-radius: 20px;
            background: #fff; border: 2px solid #eee; font-size: 28px; font-weight: bold;
            transition: 0.3s;
        }
        .rank-num { width: 80px; font-size: 36px; font-weight: 900; color: #aaa; }
        .rank-1 .rank-num { color: #f1c40f; }
        .rank-2 .rank-num { color: #95a5a6; }
        .rank-3 .rank-num { color: #d35400; }
        
        .rank-img { width: 80px; height: 80px; object-fit: contain; margin: 0 30px; border-radius: 50%; background: #fdfdfd; border: 1px solid #eee; }
        .rank-name { flex-grow: 1; text-align: left; }
        .rank-score { font-size: 32px; color: #5d4037; }

        .loading { font-size: 22px; color: #aaa; margin: 50px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="tab-menu">
        <button class="tab-btn active" data-tab="input-tab">スコア登録</button>
        <button class="tab-btn" data-tab="ranking-tab">🏆 ランキング</button>
    </div>

    <div id="input-tab" class="tab-content active">
        <h2>参戦する</h2>
        <div class="form-group">
            <label class="main-label">ユーザー名</label>
            <input type="text" id="username" placeholder="例: たなか太郎">
        </div>
        <div class="form-group">
            <label class="main-label">点数</label>
            <input type="number" id="score" placeholder="0" min="0">
        </div>
        <div class="form-group">
            <label class="main-label">陣営を選択</label>
            <div class="faction-select-container">
                <label class="faction-card faction-card-kinoko">
                    <input type="radio" name="faction" value="kinoko" checked>
                    <img src="./kinoko.png" alt="きのこ">
                    <p>きのこの山</p>
                </label>
                <label class="faction-card faction-card-takenoko">
                    <input type="radio" name="faction" value="takenoko">
                    <img src="./takenoko.png" alt="たけのこ">
                    <p>たけのこの里</p>
                </label>
            </div>
        </div>
        <button id="submit-btn" class="submit-btn">スコアを送信して参戦！</button>
        <div id="message-box" class="message"></div>
    </div>

    <div id="ranking-tab" class="tab-content">
        <h2>TOP 5</h2>
        <div id="loading" class="loading">戦況を読み込み中...</div>
        <ol id="ranking" class="ranking-list" style="display: none;"></ol>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, query, orderByChild, limitToLast, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // --- Firebaseの設定 (あなたの情報を適用済み) ---
    const firebaseConfig = {
        apiKey: "AIzaSyA2lcY-0TXBKFN2VajwSuQha8TfBvJeQk8",
        authDomain: "ranking-73f77.firebaseapp.com",
        databaseURL: "https://ranking-73f77-default-rtdb.firebaseio.com",
        projectId: "ranking-73f77",
        storageBucket: "ranking-73f77.firebasestorage.app",
        messagingSenderId: "192093284893",
        appId: "1:192093284893:web:c18f7dbfdec693cce2f4f4",
        measurementId: "G-9W2L9K2SW3"
    };

    // --- ローカル画像の設定 ---
    const factionImages = {
        kinoko: "./kinoko.png",     // 同じフォルダのきのこ画像
        takenoko: "./takenoko.png"   // 同じフォルダのたけのこ画像
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // タブ切り替え
    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabContents = document.querySelectorAll('.tab-content');
    tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            tabBtns.forEach(b => b.classList.remove('active'));
            tabContents.forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(btn.getAttribute('data-tab')).classList.add('active');
        });
    });

    // スコア送信
    const usernameInput = document.getElementById('username');
    const scoreInput = document.getElementById('score');
    const submitBtn = document.getElementById('submit-btn');
    const messageBox = document.getElementById('message-box');

    submitBtn.addEventListener('click', () => {
        const username = usernameInput.value.trim();
        const score = scoreInput.value;
        const faction = document.querySelector('input[name="faction"]:checked').value;

        if (!username || !score) {
            messageBox.textContent = "名前と点数を入力してください。";
            messageBox.className = "message error";
            return;
        }

        set(ref(db, `scores/${username}`), {
            score: Number(score),
            faction: faction
        }).then(() => {
            messageBox.textContent = `${username}さんのスコアを保存しました！`;
            messageBox.className = "message success";
            usernameInput.value = '';
            scoreInput.value = '';
        }).catch(err => {
            messageBox.textContent = "エラーが発生しました: " + err.message;
            messageBox.className = "message error";
        });
    });

    // ランキングリアルタイム更新
    const rankingList = document.getElementById('ranking');
    const loadingDiv = document.getElementById('loading');
    const scoresRef = ref(db, 'scores');
    const topScoresQuery = query(scoresRef, orderByChild('score'), limitToLast(5));

    onValue(topScoresQuery, (snapshot) => {
        loadingDiv.style.display = 'none';
        rankingList.innerHTML = '';

        if (!snapshot.exists()) {
            rankingList.innerHTML = '<li class="no-data">まだデータがありません</li>';
            rankingList.style.display = 'block';
            return;
        }

        const items = [];
        snapshot.forEach(child => {
            const val = child.val();
            items.push({ name: child.key, score: val.score, faction: val.faction });
        });
        items.reverse();

        items.forEach((item, i) => {
            const li = document.createElement('li');
            li.className = `ranking-item rank-${i+1}`;
            const imgSrc = factionImages[item.faction] || factionImages.kinoko;
            
            li.innerHTML = `
                <span class="rank-num">${i+1}</span>
                <img src="${imgSrc}" class="rank-img" alt="icon">
                <span class="rank-name">${item.name}</span>
                <span class="rank-score">${item.score}点</span>
            `;
            rankingList.appendChild(li);
        });
        rankingList.style.display = 'flex';
    });
</script>
</body>
</html>

「きのこの山」と「たけのこの里」のスコア管理システムが完成しました！ご自身のPCで作成した `index.html` と同じ場所に、画像ファイルを配置してぜひ試してみてください。
